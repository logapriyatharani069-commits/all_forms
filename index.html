
         <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bootstrap Forms Project</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CDN -->
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

  <style>
    body {
      background: #f4f6f9;
    }
    h2 {
      margin-top: 40px;
      text-align: center;
      font-weight: bold;
    }
    .card {
      margin-top: 20px;
      border-radius: 15px;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- 🔹 TITLE -->
  <h1 class="text-center mt-4">Bootstrap Forms Full Project</h1>

  <!-- 🔹 1. STACKED FORM -->
  <h2>1. Stacked Form</h2>
  <div class="card p-4">
    <form>
      <div class="form-group">
        <label>Name</label>
        <input type="text" class="form-control" placeholder="Enter name">
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" class="form-control" placeholder="Enter email">
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" class="form-control" placeholder="Enter password">
      </div>

      <div class="form-group">
        <label>Message</label>
        <textarea class="form-control" rows="3"></textarea>
      </div>

      <div class="form-check">
        <input type="checkbox" class="form-check-input">
        <label class="form-check-label">Agree terms</label>
      </div>

      <button class="btn btn-primary mt-3">Submit</button>
    </form>
  </div>

  <!-- 🔹 2. INLINE FORM -->
  <h2>2. Inline Form</h2>
  <div class="card p-4">
    <form class="form-inline justify-content-center">
      <input type="text" class="form-control mb-2 mr-sm-2" placeholder="Name">
      <input type="email" class="form-control mb-2 mr-sm-2" placeholder="Email">

      <div class="form-check mb-2 mr-sm-2">
        <input class="form-check-input" type="checkbox">
        <label class="form-check-label">Agree</label>
      </div>

      <button class="btn btn-success mb-2">Submit</button>
    </form>
  </div>

  <!-- 🔹 3. HORIZONTAL FORM -->
  <h2>3. Horizontal Form</h2>
  <div class="card p-4">
    <form>
      <div class="form-group row">
        <label class="col-sm-2 col-form-label">Email</label>
        <div class="col-sm-10">
          <input type="email" class="form-control" placeholder="Email">
        </div>
      </div>

      <div class="form-group row">
        <label class="col-sm-2 col-form-label">Password</label>
        <div class="col-sm-10">
          <input type="password" class="form-control" placeholder="Password">
        </div>
      </div>

      <button class="btn btn-primary">Login</button>
    </form>
  </div>

  <!-- 🔹 4. SELECT + RADIO -->
  <h2>4. Select & Radio</h2>
  <div class="card p-4">
    <form>
      <div class="form-group">
        <label>Select Course</label>
        <select class="form-control">
          <option>HTML</option>
          <option>CSS</option>
          <option>Bootstrap</option>
        </select>
      </div>

      <label>Gender</label><br>
      <div class="form-check form-check-inline">
        <input type="radio" class="form-check-input" name="gender">
        <label class="form-check-label">Male</label>
      </div>

      <div class="form-check form-check-inline">
        <input type="radio" class="form-check-input" name="gender">
        <label class="form-check-label">Female</label>
      </div>
    </form>
  </div>

  <!-- 🔹 5. INPUT SIZES -->
  <h2>5. Input Sizes</h2>
  <div class="card p-4">
    <input class="form-control form-control-lg mb-3" placeholder="Large input">
    <input class="form-control mb-3" placeholder="Default input">
    <input class="form-control form-control-sm" placeholder="Small input">
  </div>

  <!-- 🔹 6. DISABLED FORM -->
  <h2>6. Disabled Form</h2>
  <div class="card p-4">
    <fieldset disabled>
      <input type="text" class="form-control mb-2" placeholder="Disabled input">
      <select class="form-control">
        <option>Disabled select</option>
      </select>
    </fieldset>
  </div>

  <!-- 🔹 7. VALIDATION -->
  <h2>7. Validation Form</h2>
  <div class="card p-4">
    <form>
      <div class="form-group">
        <label>Email</label>
        <input type="email" class="form-control is-valid" value="success@gmail.com">
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" class="form-control is-invalid" placeholder="Wrong password">
      </div>
    </form>
  </div>

</div>

</body>
</html>
